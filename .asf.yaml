github:
  description: "Docker packaging for Apache Flink"
  homepage: https://flink.apache.org/
  labels:
    - flink
    - docker
  enabled_merge_buttons:
    squash: true
    merge: false
    rebase: true
  rulesets:
    - name: "Default Branch Protection"
      type: branch
      branches:
        includes:
          - "~DEFAULT_BRANCH"
          - "release/*"
          - "rel/*"
        excludes: []
      bypass_teams:
        - root
      restrict_deletion: true
      restrict_force_push: true
